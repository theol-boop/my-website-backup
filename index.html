<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="countdown-display" style="display: none;"></div> <!-- Initially hidden via style to prevent FOUC -->

    <header class="site-header">

            <div></div>
            <nav class="main-nav">
                <!-- Navigation links will go here later -->
                <!-- Hamburger icon for mobile will be added via CSS -->

        <div class="header-center">

        </div>
        <div class="header-right">

    <main>

            <a href="https://jkbx.fm" target="_blank" class="icon-link" id="jkbx-link">

                <img src="images/larger-tv-icon.png" alt="Video Icon">
            </div></a>
            <a href="james-peach.html" class="icon-link">
                <div class="icon" id="icon-james-peach">
                     <img src="images/jp-animated-logo-transparent.gif" alt="James Peach Icon" class="james-peach-icon-image">
                </div>
            </a>
            <a href="art.html" class="icon-link">
                <div class="icon" id="icon-art">
                     <img src="images/larger-lemon-icon.png" alt="Art Icon" id="artIconImage">
                     <canvas id="artIconCanvas" style="display: none;"></canvas>

            <a href="#" class="icon-link" id="red-button-link">
                <div class="icon" id="icon-red-button">

    <div class="info-box" id="jkbx-info-box">
        jkbx.fm is the internet's jukebox.<br><br>
        <a href="https://jkbx.fm" target="_blank">go to jkbx.fm</a><br>
        <a href="jkbx.html">learn more</a>

    <div class="info-box" id="header-logo-info-box">
        tl;dr Theo Lebeaux is a creative technologist, musician, and artist exploring the intersections of art, technology, and sound.

    <div class="info-box" id="self-destruct-popup" style="display: none;">
        this will now self destruct
    </div>

    <div id="click-log-message" style="display: none;">you've clicked the button <span class="click-count-number">0</span> times.</div>
    
    <div id="apocalypse-overlay"></div>

    <script src="script.js" defer></script>

    <div id="comet">
