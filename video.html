<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video - Theo Lebeaux</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="site-header">
        <a href="index.html" class="back-button">
            <img src="images/back-button.svg" alt="Back">
        </a>
        <nav class="main-nav"></nav>
        <img src="images/theo-lebeaux-logo.png" alt="Theo Lebeaux Logo" class="logo">
    </header>

    <main class="video-gallery-container">
        <h1>Video</h1>
        <div class="video-gallery">
            <!-- Video Item 1 -->
            <div class="video-item" data-video-id="1">
                <div class="video-placeholder"></div>
                <p class="video-description">Short description for video 1 goes here.</p>
            </div>

            <!-- Video Item 2 -->
            <div class="video-item" data-video-id="2">
                <div class="video-placeholder"></div>
                <p class="video-description">Another description, perhaps a bit longer, for the second video.</p>
            </div>

            <!-- Video Item 3 -->
            <div class="video-item" data-video-id="3">
                <div class="video-placeholder"></div>
                <p class="video-description">Video 3 description.</p>
            </div>

            <!-- Add more video items as needed -->

        </div>
    </main>

    <!-- Theater Mode Overlay -->
    <div id="theater-overlay"></div>
    <!-- Placeholder for the actual video player in theater mode -->
    <div id="theater-player-container"></div>

    <footer>
        <!-- Footer content can be added later -->
    </footer>

    <script src="script.js" defer></script>
</body>
</html>
